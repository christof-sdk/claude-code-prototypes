      box-shadow: 4px 0 24px var(--shadow);

      opacity: 0.40; overflow: hidden;
    }

      position: absolute;
      height: 100%;
      width: 396.69%;

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }
    .logo-mark {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--forest) 0%, var(--sage) 100%);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(27,67,50,0.25);
    }
    .logo-name {
      font-size: 21px; font-weight: 800;
      color: var(--forest); letter-spacing: -0.6px;
    }
    .logo-name em { color: var(--orange); font-style: normal; }
    .tagline {
      font-size: 13px; line-height: 1.6; color: #101010;
      margin-bottom: 26px; position: relative; z-index: 1;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 14px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 10px;
      position: relative; z-index: 1;
    }

    /* ── Drop zone ── */
    .dropzone {
      border: 2px dashed #535353;
      border-radius: 16px;
      padding: 24px 16px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(216,243,220,0.9);
      margin-bottom: 14px;
      flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .dropzone:hover, .dropzone.over {
      border-color: #333;
      background: rgba(195,232,209,0.95);
    }
    .dropzone svg { margin-bottom: 8px; }
    .dropzone p { font-size: 13.5px; color: var(--text-muted); line-height: 1.55; }
    .dropzone p strong { color: var(--forest); font-weight: 600; }
    .dropzone small { font-size: 11px; color: #8aad98; }
    #fileInput { display: none; }

    /* ── File list ── */
    .file-list {
      flex: 1; overflow-y: auto; margin-bottom: 14px; min-height: 0;
      position: relative; z-index: 1;
    }
    .file-list::-webkit-scrollbar { width: 4px; }
    .file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .file-empty {
      text-align: center; padding: 20px 0;
      font-size: 13px; color: #474747;
    }

    .file-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      background: rgba(255,255,255,0.75);
      border-radius: 10px; margin-bottom: 5px;
      font-size: 13px; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

    .file-icon {
      width: 30px; height: 30px; flex-shrink: 0;
      background: var(--mint-light); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .file-name {
      flex: 1; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-size { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
    .file-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--mint); flex-shrink: 0; }
    .file-remove {
      width: 20px; height: 20px; flex-shrink: 0; cursor: pointer;
      color: #aac2b4; display: flex; align-items: center; justify-content: center;
      border-radius: 4px; transition: color 0.15s;
    }
    .file-remove:hover { color: #e06a45; }

    /* ── Merge button ── */
    .btn-merge {
      width: 100%; padding: 14px 16px;
      background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%);
      color: #fff; border: none; border-radius: 13px;
      font-size: 14.5px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      flex-shrink: 0; position: relative; z-index: 1;
      box-shadow: 0 6px 18px rgba(27,67,50,0.22);
      letter-spacing: 0.1px;
    }
    .btn-merge:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(27,67,50,0.28);
    }
    .btn-merge:active:not(:disabled) { transform: translateY(0); }
    .btn-merge:disabled { opacity: 0.42; cursor: not-allowed; box-shadow: none; }

    /* ── RIGHT PANEL ── */
    .right-panel {
      flex: 1; position: relative; overflow: hidden;
    }
    #map { width: 100%; height: 100%; }

    /* ── Map empty state overlay ── */
    .map-empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: rgba(242,245,240,0.82);
      backdrop-filter: blur(2px);
      z-index: 500;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .map-empty.gone { opacity: 0; }
    .map-empty p { font-size: 15px; color: var(--text-muted); font-weight: 500; }

    /* ── Stats strip ── */
    .stats-strip {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: #fff; border-radius: 50px;
      padding: 8px 22px; display: flex; gap: 22px;
      z-index: 600; box-shadow: 0 2px 14px rgba(0,0,0,0.10);
      font-size: 13px; white-space: nowrap;
      opacity: 0; transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .stats-strip.visible { opacity: 1; }
    .stat { display: flex; align-items: center; gap: 7px; }
    .stat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); }
    .stat strong { font-weight: 700; color: var(--forest); }

    /* ── Map bottom controls ── */
    .map-controls {
      position: absolute; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 600;
    }
    .btn-dl {
      padding: 12px 26px;
      background: var(--orange); color: #fff;
      border: none; border-radius: 50px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 5px 18px rgba(244,132,95,0.40);
      letter-spacing: 0.1px;
    }
    .btn-dl:hover:not(:disabled) {
      background: var(--orange-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(244,132,95,0.50);
    }
    .btn-dl:disabled { opacity: 0.38; cursor: not-allowed; box-shadow: none; }

    .btn-reset {
      padding: 12px 22px;
      background: #fff; color: var(--text);
      border: 1px solid var(--border); border-radius: 50px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      display: flex; align-items: center; gap: 7px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .btn-reset:hover { background: #f4f7f0; transform: translateY(-1px); }
  </style>
</head>

  <!-- Download + Reset -->
  <div class="map-controls">
    <button class="btn-dl" id="downloadBtn" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 3 L8 11" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M4.5 8 L8 12 L11.5 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 14 L14 14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Download GPX
    </button>
    <button class="btn-reset" id="resetBtn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2.5 8 C2.5 4.96 4.96 2.5 8 2.5 C10.24 2.5 12.17 3.82 13.06 5.74"
              stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M13.5 8 C13.5 11.04 11.04 13.5 8 13.5 C5.76 13.5 3.83 12.18 2.94 10.26"
              stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M13 2.5 L13 5.5 L10 5.5" stroke="var(--text-muted)" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Reset
    </button>
  </div>
</div>

<script>
(function () {
  /* ── state ── */
  let files = [];
  let mergedSegments = null;
  let trackLayer = null;

  /* ── map init ── */
  const map = L.map('map', { zoomControl: true }).setView([48, 10], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  /* ── refs ── */
  const dropzone   = document.getElementById('dropzone');
  const fileInput  = document.getElementById('fileInput');
  const fileList   = document.getElementById('fileList');
  const fileEmpty  = document.getElementById('fileEmpty');
  const mergeBtn   = document.getElementById('mergeBtn');
  const downloadBtn= document.getElementById('downloadBtn');
  const resetBtn   = document.getElementById('resetBtn');
  const mapEmpty   = document.getElementById('mapEmpty');
  const statsStrip = document.getElementById('statsStrip');

  /* ── drag/drop ── */
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('over');
    addFiles([...e.dataTransfer.files]);
  });
  fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

  function addFiles(incoming) {
    const gpx = incoming.filter(f => f.name.toLowerCase().endsWith('.gpx'));
    gpx.forEach(f => {
      if (!files.find(x => x.name === f.name && x.size === f.size)) files.push(f);
    });
    renderFiles();
    mergeBtn.disabled = files.length < 1;
  }

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }

  function renderFiles() {
    fileList.innerHTML = '';
    if (files.length === 0) {
      fileList.appendChild(fileEmpty);
      fileEmpty.style.display = '';
      return;
    }
    files.forEach((f, i) => {
      const el = document.createElement('div');
      el.className = 'file-item';
      el.innerHTML = `
        <div class="file-icon">
          <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
            <path d="M2 1 L9 1 L12 4 L12 15 L2 15 Z" stroke="var(--sage)" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 1 L9 4 L12 4" stroke="var(--sage)" stroke-width="1.5"/>
            <path d="M4 8 L10 8" stroke="var(--sage)" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M4 11 L7.5 11" stroke="var(--sage)" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="file-name" title="${f.name}">${f.name}</span>
        <span class="file-size">${fmtSize(f.size)}</span>
        <div class="file-dot"></div>
        <div class="file-remove" data-i="${i}" title="Remove">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 2 L10 10 M10 2 L2 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>`;
      fileList.appendChild(el);
    });
    fileList.querySelectorAll('.file-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        files.splice(+btn.dataset.i, 1);
        renderFiles();
        mergeBtn.disabled = files.length < 1;
        if (files.length === 0) mergeBtn.disabled = true;
      });
    });
  }

  /* ── GPX parser ── */
  function parseGPX(xml) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const pts = [];
    doc.querySelectorAll('trkpt, rtept').forEach(p => {
      const lat = parseFloat(p.getAttribute('lat'));
      const lon = parseFloat(p.getAttribute('lon'));
      if (isNaN(lat) || isNaN(lon)) return;
      pts.push({
        lat, lon,
        ele:  p.querySelector('ele')  ? parseFloat(p.querySelector('ele').textContent)  : null,
        time: p.querySelector('time') ? p.querySelector('time').textContent : null
      });
    });
    return pts;
  }

  /* ── Haversine ── */
  function haversine(a, b) {
    const R = 6371, r = Math.PI/180;
    const dLat = (b.lat-a.lat)*r, dLon = (b.lon-a.lon)*r;
    const h = Math.sin(dLat/2)**2 + Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1-h));
  }

  function totalDist(segs) {
    let d = 0;
    segs.forEach(s => { for (let i=1;i<s.length;i++) d += haversine(s[i-1], s[i]); });
    return d;
  }

  /* ── Merge ── */
  mergeBtn.addEventListener('click', async () => {
    mergeBtn.disabled = true;
    mergeBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M8 2 L8 14" stroke="white" stroke-width="2" stroke-dasharray="2 2" stroke-linecap="round"/>
    </svg> Merging…`;

    const segs = [];
    for (const f of files) {
      const text = await f.text();
      const pts = parseGPX(text);
      if (pts.length) segs.push(pts);
    }

    mergeBtn.disabled = false;
    mergeBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M4 5.5 Q9 9 14 5.5" stroke="white" stroke-width="1.9" stroke-linecap="round"/>
      <path d="M4 12.5 Q9 9 14 12.5" stroke="white" stroke-width="1.9" stroke-linecap="round"/>
      <circle cx="9" cy="9" r="2.2" fill="white"/>
    </svg> Merge Tracks`;

    if (!segs.length) return;
    mergedSegments = segs;

    /* draw map */
    if (trackLayer) map.removeLayer(trackLayer);
    trackLayer = L.layerGroup().addTo(map);

    const palette = ['#1B4332','#2D6A4F','#40916C','#52B788','#74C69D','#95D5B2'];
    const allLL = [];

    segs.forEach((seg, i) => {
      const ll = seg.map(p => [p.lat, p.lon]);
      allLL.push(...ll);
      L.polyline(ll, {
        color: palette[i % palette.length],
        weight: 4.5, opacity: 0.88,
        lineJoin: 'round', lineCap: 'round'
      }).addTo(trackLayer);

      /* start dot */
      L.circleMarker(ll[0], {
        radius: 7, color: '#fff', weight: 2,
        fillColor: '#40916C', fillOpacity: 1
      }).bindTooltip(`Start — ${files[i]?.name || 'Segment '+(i+1)}`).addTo(trackLayer);

      /* end dot */
      L.circleMarker(ll[ll.length-1], {
        radius: 7, color: '#fff', weight: 2,
        fillColor: '#F4845F', fillOpacity: 1
      }).bindTooltip(`End — ${files[i]?.name || 'Segment '+(i+1)}`).addTo(trackLayer);
    });

    if (allLL.length) map.fitBounds(L.latLngBounds(allLL), { padding: [50, 50] });

    /* stats */
    const km  = totalDist(segs);
    const elevGain = segs.reduce((total, seg) => {
      for (let i = 1; i < seg.length; i++) {
        if (seg[i].ele !== null && seg[i-1].ele !== null) {
          const diff = seg[i].ele - seg[i-1].ele;
          if (diff > 0) total += diff;
        }
      }
      return total;
    }, 0);
    document.getElementById('statSegments').textContent = segs.length;
    document.getElementById('statDist').textContent     = km >= 1 ? km.toFixed(1)+' km' : (km*1000).toFixed(0)+' m';
    document.getElementById('statElev').textContent     = elevGain > 0 ? '+' + Math.round(elevGain) + ' m' : 'n/a';

    statsStrip.classList.add('visible');
    mapEmpty.classList.add('gone');
    downloadBtn.disabled = false;
  });

  /* ── Generate GPX ── */
  function buildGPX(segs) {
    let out = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="TrailMerge"
  xmlns="http://www.topografix.com/GPX/1/1"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.topografix.com/GPX/1/1 http://www.topografix.com/GPX/1/1/gpx.xsd">
  <metadata><name>Merged Track</name><time>${new Date().toISOString()}</time></metadata>
  <trk><name>Merged GPX Track</name>\n`;

    segs.forEach(seg => {
      out += '    <trkseg>\n';
      seg.forEach(p => {
        out += `      <trkpt lat="${p.lat.toFixed(7)}" lon="${p.lon.toFixed(7)}">`;
        if (p.ele  !== null) out += `<ele>${p.ele.toFixed(1)}</ele>`;
        if (p.time)          out += `<time>${p.time}</time>`;
        out += `</trkpt>\n`;
      });
      out += '    </trkseg>\n';
    });

    out += `  </trk>\n</gpx>`;
    return out;
  }

  /* ── Download ── */
  downloadBtn.addEventListener('click', () => {
    if (!mergedSegments) return;
    const blob = new Blob([buildGPX(mergedSegments)], { type: 'application/gpx+xml' });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: `trailmerge-${Date.now()}.gpx`
    });
    a.click();
    URL.revokeObjectURL(a.href);
  });

  /* ── Reset ── */
  resetBtn.addEventListener('click', () => {
    files = []; mergedSegments = null;
    renderFiles();
    mergeBtn.disabled = true;
    downloadBtn.disabled = true;
    if (trackLayer) { map.removeLayer(trackLayer); trackLayer = null; }
    mapEmpty.classList.remove('gone');
    statsStrip.classList.remove('visible');
    fileInput.value = '';
  });
})();
</script>
</body>
</html>
